name: Sync PCK7 Musica Data

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p _data/pck7

      - name: Fetch partiture from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Fetching partiture..."
          curl -f -s "${SUPABASE_URL}/rest/v1/partiture?select=id,testo_originale,layer,strategia,n_eventi,data,note&order=data" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o _data/pck7/partiture.json

          echo "Partiture downloaded:"
          jq '. | length' _data/pck7/partiture.json
          echo "records"

      - name: Fetch profili tre assi from Caddy
        run: |
          echo "Fetching profili tre assi..."
          if curl -f -s https://log-puck.org/nucleo/nucleo_publish/pck7/profili_tre_assi.json \
               -o _data/pck7/profili_tre_assi.json; then
            echo "Profili downloaded:"
            jq '. | length' _data/pck7/profili_tre_assi.json
            echo "records"
          else
            echo "Profili not available yet on server — keeping existing file"
          fi

      - name: Fetch eventi partitura from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Fetching eventi..."
          curl -f -s "${SUPABASE_URL}/rest/v1/partiture_eventi?select=partitura_id,event_id,ordine,testo,dove,come,freq_start,freq_end,attack_ms,t_on_ms,decay_ms,note&order=partitura_id,ordine" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o _data/pck7/eventi.json

          echo "Eventi downloaded:"
          jq '. | length' _data/pck7/eventi.json
          echo "records"

      - name: Fetch sessioni hardware from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Fetching sessioni..."
          curl -f -s "${SUPABASE_URL}/rest/v1/sessioni?select=id,partitura_id,run_n,test_type,timestamp,note&partitura_id=not.is.null&order=partitura_id,run_n" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o _data/pck7/sessioni.json

          echo "Sessioni downloaded:"
          jq '. | length' _data/pck7/sessioni.json
          echo "records"

      - name: Fetch mappa acustica from Caddy (legacy fallback)
        run: |
          echo "Fetching mappa acustica (legacy)..."
          if curl -f -s https://log-puck.org/nucleo/nucleo_publish/pck7/mappa_acustica.json \
               -o _data/pck7/mappa_acustica.json; then
            echo "Mappa downloaded:"
            jq '.n_frequenze' _data/pck7/mappa_acustica.json
            echo "frequenze"
          else
            echo "Mappa not available — keeping existing file"
          fi

      - name: Fetch sweep analysis from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Fetching sweep_analysis..."
          curl -f -s \
            "${SUPABASE_URL}/rest/v1/sweep_analysis?select=freq_hz,ina_smooth,inmp_smooth,ina_pct,inmp_pct,ina_trend,efficienza,zona_dove&sweep_id=like.pp42_sweep_*_up&order=freq_hz" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Range: 0-1999" \
            -o /tmp/sweep_raw.json

          RAW_COUNT=$(jq '. | length' /tmp/sweep_raw.json)
          echo "Raw points fetched: ${RAW_COUNT}"

          if [ "$RAW_COUNT" -gt 0 ]; then
            jq '
              group_by(.zona_dove) |
              {
                n_punti: (map(length) | add),
                range_hz: [([.[][].freq_hz] | min), ([.[][].freq_hz] | max)],
                zone: map({
                  zona: .[0].zona_dove,
                  range_hz: [([.[].freq_hz] | min), ([.[].freq_hz] | max)],
                  n_punti: length,
                  inmp_avg: (([.[].inmp_smooth] | add / length) * 10 | round / 10),
                  inmp_max: ([.[].inmp_smooth] | max),
                  freq_inmp_max: (sort_by(-.inmp_smooth) | .[0].freq_hz),
                  ina_avg: (([.[].ina_smooth] | add / length) * 10 | round / 10),
                  ina_max: ([.[].ina_smooth] | max),
                  freq_ina_max: (sort_by(-.ina_smooth) | .[0].freq_hz),
                  efficienza_avg: (([.[].efficienza] | add / length) * 100 | round / 100),
                  frequenze: [.[] | {
                    freq_hz,
                    inmp: .inmp_smooth,
                    ina: .ina_smooth,
                    inmp_pct,
                    ina_pct,
                    ina_trend,
                    efficienza
                  }]
                }) | sort_by(.range_hz[0])
              }
            ' /tmp/sweep_raw.json > _data/pck7/sweep_analysis.json

            echo "Sweep analysis zones:"
            jq '.zone | length' _data/pck7/sweep_analysis.json
            echo "zones, total points:"
            jq '.n_punti' _data/pck7/sweep_analysis.json
          else
            echo "No sweep data returned — keeping existing file"
          fi

      - name: Check git status
        run: |
          echo "Git status:"
          git status --short

      - name: Commit and push
        run: |
          git config user.name "PCK7 Sync Bot"
          git config user.email "pck7@log-puck.org"

          git add _data/pck7/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "PCK7 data sync — ${TIMESTAMP}"
            git push
            echo "Changes committed and pushed"
          fi

      - name: Summary
        run: |
          echo "### PCK7 Musica Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "_data/pck7/partiture.json" ]; then
            PARTITURE=$(jq '. | length' _data/pck7/partiture.json)
            echo "**Partiture:** ${PARTITURE}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "_data/pck7/profili_tre_assi.json" ]; then
            PROFILI=$(jq '. | length' _data/pck7/profili_tre_assi.json)
            echo "**Profili tre assi:** ${PROFILI}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "_data/pck7/eventi.json" ]; then
            EVENTI=$(jq '. | length' _data/pck7/eventi.json)
            echo "**Eventi partitura:** ${EVENTI}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "_data/pck7/sessioni.json" ]; then
            SESSIONI=$(jq '. | length' _data/pck7/sessioni.json)
            echo "**Sessioni hardware:** ${SESSIONI}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "_data/pck7/mappa_acustica.json" ]; then
            FREQ=$(jq '.n_frequenze' _data/pck7/mappa_acustica.json)
            ZONE=$(jq '.zone | length' _data/pck7/mappa_acustica.json)
            echo "**Mappa acustica (legacy):** ${FREQ} frequenze, ${ZONE} zone" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "_data/pck7/sweep_analysis.json" ]; then
            PUNTI=$(jq '.n_punti' _data/pck7/sweep_analysis.json)
            SZONE=$(jq '.zone | length' _data/pck7/sweep_analysis.json)
            echo "**Sweep analysis:** ${PUNTI} punti, ${SZONE} zone" >> $GITHUB_STEP_SUMMARY
          fi
